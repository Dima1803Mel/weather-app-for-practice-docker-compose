services:
  weather-app:
    image: weather:latest
    container_name: weather-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-7e7b169fa1aec31eb0da2b1399d30739}
    networks:
      - app-network

  # Nginx как обратный прокси
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - weather-app
    networks:
      - app-network

  # Watchtower для автоматического обновления
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=60
    command: --interval 60 weather-app

networks:
  app-network:
    driver: bridge